<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: white;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .menu-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: transparent;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      z-index: 1001;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -220px;
      width: 220px;
      height: 100%;
      background: #0f172a;
      padding-top: 70px;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.08);
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    .content {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      font-weight: 800;
    }

    p {
      margin: 0 0 24px;
      color: #d1d5db;
      font-size: 1rem;
      font-weight: 500;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .vote-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      min-width: 140px;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .vote-btn:hover {
      transform: translateY(-2px);
    }

    .year7 {
      background: #22c55e;
    }

    .year8 {
      background: #f97316;
    }

    .results {
      margin-top: 24px;
      font-size: 1rem;
      font-weight: 600;
    }

    .message {
      margin-top: 12px;
      min-height: 20px;
      color: #e5e7eb;
      font-weight: 500;
    }

    .current-vote {
      margin-top: 8px;
      min-height: 20px;
      color: #bfdbfe;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .back {
      display: inline-block;
      margin-top: 22px;
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
    }

    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="sub.html">Sub Page</a>
    <a href="page3.html">About Me</a>
    <a href="page4.html">Shoutout</a>
    <a href="page5.html">Socials</a>
    <a href="page6.html">Clients</a>
    <a href="page7.html">Vote</a>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <div class="content">
    <h1>Year 7 vs Year 8</h1>
    <p>Vote for the year group you think is better.</p>

    <div class="buttons">
      <button class="vote-btn year7" onclick="vote('Year 7')">Year 7</button>
      <button class="vote-btn year8" onclick="vote('Year 8')">Year 8</button>
    </div>

    <div class="results">
      <p>Year 7 Votes: <span id="year7Votes">0</span></p>
      <p>Year 8 Votes: <span id="year8Votes">0</span></p>
    </div>

    <div class="message" id="message"></div>
    <div class="current-vote" id="currentVote"></div>

    <a class="back" href="index.html">← Back to Home</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      increment,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const voteRef = doc(db, "votes", "year7vsyear8");

    let deviceId = localStorage.getItem("deviceId");
    if (!deviceId) {
      deviceId = "device_" + Math.random().toString(36).substring(2) + Date.now();
      localStorage.setItem("deviceId", deviceId);
    }

    const userVoteRef = doc(db, "userVotes", deviceId);

    window.toggleMenu = function () {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    };

    const year7El = document.getElementById("year7Votes");
    const year8El = document.getElementById("year8Votes");
    const messageEl = document.getElementById("message");
    const currentVoteEl = document.getElementById("currentVote");

    let currentUserVote = "";

    onSnapshot(voteRef, (snap) => {
      const data = snap.data() || {};
      year7El.textContent = data.year7 || 0;
      year8El.textContent = data.year8 || 0;
    });

    async function loadUserVote() {
      const snap = await getDoc(userVoteRef);
      if (snap.exists()) {
        currentUserVote = snap.data().vote || "";
        currentVoteEl.textContent = "Your current vote: " + currentUserVote;
        messageEl.textContent = "You can change your vote anytime.";
      } else {
        currentVoteEl.textContent = "You haven't voted yet.";
        messageEl.textContent = "Pick your favorite year group.";
      }
    }

    window.vote = async function (choice) {
      const updates = {};

      if (currentUserVote === "Year 7") updates.year7 = increment(-1);
      if (currentUserVote === "Year 8") updates.year8 = increment(-1);

      if (choice === "Year 7") updates.year7 = increment(1);
      if (choice === "Year 8") updates.year8 = increment(1);

      await setDoc(voteRef, updates, { merge: true });
      await setDoc(userVoteRef, { vote: choice }, { merge: true });

      currentUserVote = choice;
      currentVoteEl.textContent = "Your current vote: " + currentUserVote;
      messageEl.textContent = "Vote updated!";
    };

    loadUserVote();
  </script>
</body>
</html>
