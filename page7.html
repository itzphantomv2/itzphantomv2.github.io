<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(135deg, #020617 0%, #0f172a 35%, #1d4ed8 100%);
      animation: fadeIn 0.6s ease-in;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(34, 197, 94, 0.22), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(168, 85, 247, 0.22), transparent 25%);
      filter: blur(20px);
      z-index: -2;
      animation: floatBG 10s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.06), transparent 40%, rgba(255,255,255,0.03));
      z-index: -1;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatBG {
      from { transform: translateY(0px) scale(1); }
      to { transform: translateY(-20px) scale(1.05); }
    }

    .menu-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: transparent;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      z-index: 1001;
      transition: transform 0.2s ease;
    }

    .menu-btn:hover {
      transform: scale(1.1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -220px;
      width: 220px;
      height: 100%;
      background: #0f172a;
      padding-top: 70px;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar a {
      display: block;
      color: #f8fafc;
      text-decoration: none;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border-left: 4px solid transparent;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      animation: fadeIn 0.5s ease-in;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
      border-left: 4px solid #22c55e;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    .box {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .content {
      background: rgba(255,255,255,0.08);
      padding: 60px 40px;
      border-radius: 22px;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      max-width: 750px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.2s ease;
    }

    .content:hover {
      transform: scale(1.01);
    }

    h1 {
      margin-top: 0;
      font-size: 3rem;
      font-weight: 800;
      text-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    p {
      color: #d1d5db;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .buttons {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .vote-btn {
      padding: 16px 34px;
      border: none;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      color: white;
      min-width: 170px;
    }

    .year7 {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
    }

    .year8 {
      background: linear-gradient(135deg, #f97316, #ea580c);
      box-shadow: 0 8px 20px rgba(249, 115, 22, 0.35);
    }

    .vote-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }

    .vote-btn:active {
      transform: scale(0.98);
    }

    .results {
      margin-top: 35px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .message {
      margin-top: 20px;
      font-size: 1rem;
      color: #f8fafc;
      font-weight: 700;
      min-height: 24px;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }

    .back:hover {
      text-decoration: underline;
    }

    .current-vote {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="sub.html">Sub Page</a>
    <a href="page3.html">About Me</a>
    <a href="page4.html">Shoutout</a>
    <a href="page5.html">Socials</a>
    <a href="page6.html">Clients</a>
    <a href="page7.html">Vote</a>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <div class="box">
    <div class="content">
      <h1>Year 7 vs Year 8</h1>
      <p>Vote for which year group is better — and change your vote anytime.</p>

      <div class="buttons">
        <button class="vote-btn year7" onclick="vote('Year 7')">Year 7</button>
        <button class="vote-btn year8" onclick="vote('Year 8')">Year 8</button>
      </div>

      <div class="results">
        <p>Year 7 Votes: <span id="year7Votes">0</span></p>
        <p>Year 8 Votes: <span id="year8Votes">0</span></p>
      </div>

      <div class="message" id="message"></div>
      <div class="current-vote" id="currentVote"></div>

      <a class="back" href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }

    let year7Votes = parseInt(localStorage.getItem("year7Votes")) || 0;
    let year8Votes = parseInt(localStorage.getItem("year8Votes")) || 0;
    let userVote = localStorage.getItem("userVote") || "";

    function updateDisplay() {
      document.getElementById("year7Votes").textContent = year7Votes;
      document.getElementById("year8Votes").textContent = year8Votes;

      document.getElementById("message").textContent = userVote
        ? "You can change your vote anytime."
        : "Pick your favorite year group.";

      document.getElementById("currentVote").textContent = userVote
        ? "Your current vote: " + userVote
        : "You haven't voted yet.";
    }

    function vote(choice) {
      if (userVote === "Year 7") year7Votes--;
      if (userVote === "Year 8") year8Votes--;

      if (choice === "Year 7") year7Votes++;
      if (choice === "Year 8") year8Votes++;

      userVote = choice;

      localStorage.setItem("year7Votes", year7Votes);
      localStorage.setItem("year8Votes", year8Votes);
      localStorage.setItem("userVote", userVote);

      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
