<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoutout</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(135deg, #312e81 0%, #a855f7 100%);
      color: white;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .menu-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: transparent;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      z-index: 1001;
      transition: transform 0.2s ease;
    }

    .menu-btn:hover {
      transform: scale(1.1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -220px;
      width: 220px;
      height: 100%;
      background: #111827;
      padding-top: 70px;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar a {
      display: block;
      color: #f8fafc;
      text-decoration: none;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border-left: 4px solid transparent;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      animation: fadeIn 0.5s ease-in;
    }

    .sidebar a:nth-child(1) { animation-delay: 0.05s; }
    .sidebar a:nth-child(2) { animation-delay: 0.10s; }
    .sidebar a:nth-child(3) { animation-delay: 0.15s; }
    .sidebar a:nth-child(4) { animation-delay: 0.20s; }

    .sidebar a:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
      border-left: 4px solid #22c55e;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    .box {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .content {
      background: rgba(255,255,255,0.1);
      padding: 60px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      max-width: 650px;
      min-width: 320px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .content:hover {
      transform: scale(1.01);
    }

    a.link {
      color: #fbbf24;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="sub.html">Sub Page</a>
    <a href="page3.html">About Me</a>
    <a href="page4.html">Shoutout</a>
    <a href="page5.html">Socials</a>
    <a href="page5.html">Socials</a>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <div class="box">
    <div class="content">
      <h1>Shoutout to @itzpulseV2</h1>
      <p>Big shoutout to <strong>@itzpulseV2</strong> and Chavindu for supporting the site!</p>
      <p><a class="link" href="https://youtube.com/@@itzpulseV2" target="_blank">Visit @itzpulseV2 on YouTube</a></p>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }
  </script>
</body>
</html>
