<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sub Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%);
      color: white;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .menu-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: transparent;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      z-index: 1001;
      transition: transform 0.2s ease;
    }

    .menu-btn:hover {
      transform: scale(1.1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -220px;
      width: 220px;
      height: 100%;
      background: #450a0a;
      padding-top: 70px;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .sidebar.open {
      left: 0;
    }

  .sidebar a {
  display: block;
  color: #f8fafc;
  text-decoration: none;
  padding: 16px 20px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.3px;
  border-left: 4px solid transparent;
  transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.08);
  transform: translateX(5px);
  border-left: 4px solid #22c55e;
}
    .sidebar a:hover {
      background: #7f1d1d;
      transform: translateX(4px);
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    .box {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .content {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      max-width: 500px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .content:hover {
      transform: scale(1.01);
    }

    h1 {
      margin-top: 0;
      font-size: 2.5rem;
    }

    p {
      color: #fee2e2;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      background: white;
      color: #b91c1c;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: #f3f4f6;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="sub.html">Sub Page</a>
    <a href="page3.html">About Me</a>
    <a href="page4.html">Shoutout</a>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <div class="box">
    <div class="content">
      <h1>Sub to @bantyyy</h1>
      <p>Thanks for visiting!</p>
      <a class="btn" href="https://www.youtube.com/@bantyyy" target="_blank">Open YouTube Channel</a>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }
  </script>
</body>
</html>
